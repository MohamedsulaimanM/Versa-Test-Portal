<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versa Test Portal — Online Testing Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">
    <img src="images/versa-logo.png" height="40" alt="Versa" style="vertical-align:middle">
  </a>
</nav>

<div class="hero">
  <h1>Versa Online Test</h1>
  <p>Browse available tests, enter your details, and start your test.</p>
  <div class="hero-search">
    <input id="searchInput" type="text" class="form-control" placeholder="Search tests by name…">
  </div>
</div>

<div class="container">
  <div class="section-header">
    <h2 class="section-title">Available Tests</h2>
    <span id="testCount" class="badge badge-primary"></span>
  </div>

  <div id="testsGrid" class="tests-grid"></div>

  <div id="emptyState" class="empty-state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 12h6M9 16h6M9 8h6M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
    </svg>
    <h3>No tests available</h3>
    <p>Check back later or contact your administrator.</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/storage.js"></script>
<script src="js/seed.js"></script>
<script src="js/utils.js"></script>
<script src="js/index.js"></script>
</body>
</html>
