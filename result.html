<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Complete — Versa Test Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">
    <img src="images/versa-logo.png" height="40" alt="Versa" style="vertical-align:middle">
  </a>
  <div class="navbar-links">
    <a href="index.html">← All Tests</a>
  </div>
</nav>

<div class="container" style="max-width:560px;padding-top:4rem;padding-bottom:3rem;text-align:center">
  <div class="card">
    <div class="card-body" style="padding:3rem 2rem">

      <!-- Checkmark icon -->
      <div style="width:80px;height:80px;border-radius:50%;background:var(--success-light);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h2 style="font-size:1.6rem;font-weight:800;color:var(--gray-900);margin-bottom:.5rem">
        Thanks for completing the test!
      </h2>
      <p style="color:var(--gray-500);font-size:.95rem;margin-bottom:2rem" id="metaTestTitle"></p>

      <!-- Minimal meta -->
      <div style="display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin-bottom:2rem">
        <div class="result-meta-item">
          <div class="value" id="metaName" style="font-size:1rem"></div>
          <div class="label">Name</div>
        </div>
        <div class="result-meta-item">
          <div class="value" id="metaTime" style="font-size:1rem"></div>
          <div class="label">Time Taken</div>
        </div>
        <div class="result-meta-item">
          <div class="value" id="metaDate" style="font-size:.85rem"></div>
          <div class="label">Submitted</div>
        </div>
      </div>

      <a id="backBtn" href="index.html" class="btn btn-primary btn-lg" style="width:100%">← Back to Tests</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/storage.js"></script>
<script src="js/seed.js"></script>
<script src="js/utils.js"></script>
<script src="js/result.js"></script>
</body>
</html>
